name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: TheFloor-windows
            package: |
              cd dist
              7z a ../TheFloor-windows.zip TheFloor
          - os: macos-latest
            artifact: TheFloor-macos
            package: |
              cd dist
              zip -r ../TheFloor-macos.zip TheFloor.app

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Skip poetry here: PyQt5-Qt5 wheel availability differs per platform,
        # and pip resolves the best match for the current runner.
        run: pip install "PyQt5>=5.15,<5.16" "Pillow>=10,<11" "pillow-avif-plugin>=1.4,<2" "pyinstaller>=6,<7"

      - name: Build with PyInstaller
        run: pyinstaller TheFloor.spec --noconfirm

      - name: Package
        shell: bash
        run: ${{ matrix.package }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
